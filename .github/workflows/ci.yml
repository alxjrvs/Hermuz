name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck packages/db
        run: cd packages/db && bunx tsc --noEmit -p tsconfig.json

      - name: Check migrations are up to date
        run: |
          cd packages/db
          bunx drizzle-kit generate
          if [ -n "$(git status --porcelain migrations)" ]; then
            echo "::error::Drizzle migrations are out of date — run 'bun --filter @hermuz/db generate' and commit."
            git status --porcelain migrations
            exit 1
          fi

      - name: Typecheck apps/bot
        run: cd apps/bot && bunx tsc --noEmit -p tsconfig.json

      - name: Typecheck & build apps/web
        run: cd apps/web && bun run typecheck && bun run build

      - name: Lint & format (Biome)
        run: bunx biome ci .

  # Deploy the API service to Render after CI passes on main. Render's native
  # GitHub auto-deploy has proven unreliable here, so CI is the source of truth:
  # a green build on main triggers the deploy via a scoped Deploy Hook.
  deploy:
    name: Deploy (Render)
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "::warning::RENDER_DEPLOY_HOOK_URL is not set — skipping deploy. Add the service's Deploy Hook URL as a repo secret to enable CI deploys."
            exit 0
          fi
          echo "Triggering Render deploy…"
          curl -fsS -X POST "$HOOK" > /dev/null
          echo "Deploy triggered."
